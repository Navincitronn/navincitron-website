<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navincitron - Spotify Shuffle</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="https://i.ibb.co/5hVscL2/navlogo.png" type="image/png">
    <style>
        .shuffle-panel {
            max-width: 760px;
            margin: 0 auto;
            padding: 20px;
        }

        .shuffle-card,
        .shuffle-cover-wrap,
        .shuffle-log-wrap {
            background-color: #444;
            border-radius: 10px;
            margin-top: 20px;
            padding: 20px;
        }

        .shuffle-form-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 14px;
        }

        .shuffle-form-row input[type="number"],
        .shuffle-form-row input[type="text"],
        .shuffle-form-row input[type="file"] {
            box-sizing: border-box;
            width: 100%;
            padding: 8px;
        }

        .clip-mode-row {
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 8px;
            padding: 12px;
        }

        .clip-bounds {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .checkbox-row,
        .radio-row {
            align-items: flex-start;
        }

        .shuffle-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .danger-button {
            background-color: #b93838;
        }

        .danger-button:hover {
            background-color: #8f2929;
        }

        .sampler-status,
        .shuffle-cover-meta {
            text-align: center;
        }

        .shuffle-cover-wrap {
            text-align: center;
        }

        .shuffle-cover-wrap h3 {
            margin: 0 0 20px;
        }

        .shuffle-cover-frame {
            align-items: center;
            background-color: #222;
            border-radius: 8px;
            display: flex;
            height: 300px;
            justify-content: center;
            margin: 0 auto;
            overflow: hidden;
            width: 300px;
        }

        .shuffle-cover-image {
            height: 300px;
            object-fit: cover;
            width: 300px;
        }

        .empty-cover {
            display: none;
        }

        .sampler-log {
            background-color: #111;
            border-radius: 8px;
            color: #f2f2f2;
            min-height: 220px;
            overflow-x: auto;
            padding: 12px;
            white-space: pre-wrap;
        }

        @media only screen and (max-width: 600px) {
            .clip-bounds {
                grid-template-columns: 1fr;
            }

            .shuffle-cover-frame,
            .shuffle-cover-image {
                height: 260px;
                width: 260px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <img src="https://i.ibb.co/5hVscL2/navlogo.png" alt="navlogo" class="logo" border="0" />
            <div class="brand">
                <h1>NAVINCITRON</h1>
                <br>
                <p>proper music isolation</p>
            </div>
        </div>
        <nav class="topnav">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <section class="shuffle-panel">
            <div class="shuffle-card">
                <div class="shuffle-form-row">
                    <label for="albums-file">Album / playlist text file</label>
                    <input type="file" id="albums-file" accept=".txt,text/plain" required>
                </div>

                <div class="shuffle-form-row">
                    <label for="start-index">Start at uploaded text-file line index</label>
                    <input type="number" id="start-index" min="1" value="1">
                </div>

                <div class="shuffle-form-row clip-mode-row">
                    <label class="radio-row">
                        <input type="radio" name="clip-mode" id="clip-mode-defined" value="defined" checked>
                        Defined clip length
                    </label>
                    <input type="number" id="clip-seconds" min="1" value="15">
                </div>

                <div class="shuffle-form-row clip-mode-row">
                    <label class="radio-row">
                        <input type="radio" name="clip-mode" id="clip-mode-random" value="random">
                        Random clip length within bounds
                    </label>
                    <div class="clip-bounds">
                        <div>
                            <label for="clip-min-seconds">Minimum seconds</label>
                            <input type="number" id="clip-min-seconds" min="1" value="15">
                        </div>
                        <div>
                            <label for="clip-max-seconds">Maximum seconds</label>
                            <input type="number" id="clip-max-seconds" min="1" value="30">
                        </div>
                    </div>
                </div>

                <div class="shuffle-form-row">
                    <label for="device-name">Spotify device name, optional</label>
                    <input type="text" id="device-name" placeholder="Example: DESKTOP">
                </div>

                <div class="shuffle-form-row checkbox-row">
                    <label for="random-start">Random start position</label>
                    <input type="checkbox" id="random-start" checked>
                </div>

                <details class="shuffle-advanced">
                    <summary>Advanced local-file options</summary>
                    <div class="shuffle-form-row">
                        <label for="assumed-duration-seconds">Assumed duration for local files, seconds</label>
                        <input type="number" id="assumed-duration-seconds" min="1" value="180">
                    </div>
                    <div class="shuffle-form-row">
                        <label for="local-seek-delay-seconds">Local-file seek delay, seconds</label>
                        <input type="number" id="local-seek-delay-seconds" min="0" step="0.1" value="0">
                    </div>
                </details>

                <div class="shuffle-buttons">
                    <button id="spotify-login" type="button">Login with Spotify</button>
                    <button id="start-sampler" type="button">Start Sampler</button>
                    <button id="stop-sampler" type="button" class="danger-button">Stop Sampler + Spotify</button>
                </div>

                <p id="sampler-status" class="sampler-status">Status: idle</p>
            </div>

            <div class="shuffle-cover-wrap">
                <h3 id="current-track-title">No track detected</h3>
                <div id="current-cover-frame" class="shuffle-cover-frame cover-frame-empty">
                    <img id="current-cover-image" class="shuffle-cover-image empty-cover" alt="No album cover available">
                </div>
            </div>

            <div class="shuffle-log-wrap">
                <pre id="sampler-log" class="sampler-log">No output yet.</pre>
            </div>
        </section>
    </main>

    <footer></footer>
    <script src="shuffle.js"></script>
</body>
</html>
